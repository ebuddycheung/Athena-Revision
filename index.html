<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena 温習助手 🏛️</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🏛️ Athena 温習助手</h1>
            <p class="subtitle">AI 助力 Athena 學習</p>
        </header>

        <!-- Subject Selection -->
        <section id="subject-section" class="section active">
            <h2>📚 選擇科目</h2>
            <div class="subject-grid">
                <button class="subject-btn" data-subject="chinese">
                    🇨🇳 中文
                </button>
                <button class="subject-btn" data-subject="english">
                    📖 英文
                </button>
                <button class="subject-btn" data-subject="math">
                    🔢 數學
                </button>
            </div>
        </section>

        <!-- Chapter Selection -->
        <section id="chapter-section" class="section">
            <h2 id="subject-title">📑 選擇課文</h2>
            <button class="back-btn">← 返回</button>
            <div id="chapter-list" class="chapter-list">
                <!-- Dynamically populated -->
            </div>
        </section>

        <!-- Quiz Type Selection -->
        <section id="quiz-section" class="section">
            <h2>🎯 選擇題型</h2>
            <button class="back-btn">← 返回</button>
            <div class="quiz-type-grid">
                <button class="quiz-btn" data-type="mcq">
                    <span class="icon">✅</span>
                    選擇題
                </button>
                <button class="quiz-btn" data-type="truefalse">
                    <span class="icon">⬜</span>
                    是非題
                </button>
                <button class="quiz-btn" data-type="fillblank">
                    <span class="icon">✏️</span>
                    填空題
                </button>
                <button class="quiz-btn" data-type="shortanswer">
                    <span class="icon">📝</span>
                    短答題
                </button>
            </div>
        </section>

        <!-- Quiz Taking -->
        <section id="quiz-taking-section" class="section">
            <div class="quiz-header">
                <h2>📝 練習時間！</h2>
                <span id="progress">第 1/10 題</span>
            </div>
            <button class="back-btn exit-btn">← 退出練習</button>
            
            <div id="question-container" class="question-container">
                <!-- Question displayed here -->
            </div>

            <div id="quiz-navigation" class="quiz-navigation">
                <button id="prev-btn" class="nav-btn" disabled>← 上一題</button>
                <button id="next-btn" class="nav-btn">下一題 →</button>
                <button id="submit-btn" class="submit-btn" style="display:none;">提交答案</button>
            </div>
        </section>

        <!-- Results Section -->
        <section id="results-section" class="section">
            <h2>🎉 練習完成！</h2>
            <div id="score-display" class="score-display">
                <span id="score">0</span>/<span id="total">10</span>
            </div>
            <p id="score-message"></p>
            <div id="review-section" class="review-section">
                <!-- Review answers -->
            </div>
            <button class="action-btn" onclick="restartQuiz()">再試一次</button>
            <button class="action-btn secondary" onclick="goHome()">選擇其他練習</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
